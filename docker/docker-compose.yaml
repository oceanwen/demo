services:
  mysql:
    image: mysql:8.0
    container_name: mysql-server
    restart: always
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
      - 3306:3306
    volumes:
      - ./mysql-data:/var/lib/mysql
  web:
    depends_on:
      - mysql
    image: ${REGISTRY}/demo:latest
    container_name: demo
    ports:
      - 80:80
    volumes:
      - /workspace/demo:/var/www/html
    restart: always
    network_mode: host